[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  # node_bundler must be set per-function in netlify.toml for v2 streaming support
  # Set ACCESS_MODE=code (default) or ACCESS_MODE=identity
  # Set ACCESS_CODE=123456 (your 6-digit access code, for code mode)
  # Set ACCESS_CODE_HASH=<sha256 of your code, hex string>
  # Set OPENROUTER_API_KEY=sk-or-...

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173
  autoLaunch = false

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"

[functions]
  node_bundler = "esbuild"
